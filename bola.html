<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Quiz Sepak Bola API ⚽</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
}

.box {
  margin-top: 40px;
  background: #1e2a38;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 80%;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

.normal { background: #3498db; }
</style>
</head>

<body>

<div class="box">
  <h2>⚽ Quiz Sepak Bola (Online)</h2>
  <p id="soal">Loading...</p>
  <div id="pilihan"></div>
  <p id="skor"></p>
</div>

<script>
let index = 0;
let skor = 0;
let soalList = [];

// ambil soal dari API
async function ambilSoal() {
  try {
    let res = await fetch("https://opentdb.com/api.php?amount=10&category=21&type=multiple");
    let data = await res.json();

    soalList = data.results.map(s => {
      let semuaJawaban = [...s.incorrect_answers, s.correct_answer];

      // acak pilihan
      semuaJawaban.sort(() => Math.random() - 0.5);

      return {
        soal: decodeHTML(s.question),
        pilihan: semuaJawaban.map(j => decodeHTML(j)),
        jawaban: decodeHTML(s.correct_answer)
      };
    });

    tampilSoal();

  } catch (e) {
    document.getElementById("soal").innerText = "Gagal ambil soal 😢";
  }
}

// decode HTML (biar ga aneh)
function decodeHTML(html) {
  let txt = document.createElement("textarea");
  txt.innerHTML = html;
  return txt.value;
}

function tampilSoal() {
  if (index >= soalList.length) {
    document.getElementById("soal").innerHTML = "🎉 Selesai! Skor: " + skor;
    document.getElementById("pilihan").innerHTML = "";
    return;
  }

  let s = soalList[index];
  document.getElementById("soal").innerText = s.soal;

  let html = "";
  s.pilihan.forEach(p => {
    html += `<button class="normal" onclick="jawab('${p}')">${p}</button>`;
  });

  document.getElementById("pilihan").innerHTML = html;
  document.getElementById("skor").innerText = "Skor: " + skor;
}

function jawab(p) {
  let benar = soalList[index].jawaban;

  if (p === benar) {
    skor++;
    alert("✅ Benar!");
  } else {
    alert("❌ Salah! Jawaban: " + benar);
  }

  index++;
  tampilSoal();
}

// mulai
ambilSoal();
</script>

</body>
</html>
