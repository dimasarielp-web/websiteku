<!DOCTYPE html>
<html>
<head>
  <title>Quiz GOD 🌍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f2027;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .option {
      background: #333;
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover { transform: scale(1.05); }
    .correct { background: green; }
    .wrong { background: red; }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: orange;
    }
  </style>
</head>
<body>

<h2>🌍 QUIZ GLOBAL</h2>
<div id="app"></div>

<script>
let questions = [];
let index = 0;
let score = 0;
let life = 3;
let timer;
let timeLeft = 10;
let combo = 0;
let difficulty = "easy";

// SOUND
const correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const wrongSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

// LOGIN / MENU
function menu(){
  document.getElementById("app").innerHTML = `
    <h3>Pilih Level</h3>
    <select id="diff">
      <option value="easy">Easy 😎</option>
      <option value="medium">Medium 😐</option>
      <option value="hard">Hard 💀</option>
    </select>
    <br><br>
    <button onclick="start()">START 🚀</button>
  `;
}

// START GAME
async function start(){
  difficulty = document.getElementById("diff").value;

  score = 0;
  life = 3;
  combo = 0;
  index = 0;

  // FETCH API 🌍
  let res = await fetch(`https://opentdb.com/api.php?amount=20&difficulty=${difficulty}&type=multiple`);
  let data = await res.json();

  questions = data.results.map(q=>{
    let options = [...q.incorrect_answers];
    let correctIndex = Math.floor(Math.random()*4);
    options.splice(correctIndex,0,q.correct_answer);

    return {
      q: decode(q.question),
      o: options.map(decode),
      a: correctIndex
    };
  });

  loadQ();
}

// FIX HTML TEXT
function decode(text){
  let txt = document.createElement("textarea");
  txt.innerHTML = text;
  return txt.value;
}

// LOAD QUESTION
function loadQ(){
  if(life <= 0){ gameOver(); return; }
  if(index >= questions.length){ endGame(); return; }

  timeLeft = 10;
  startTimer();

  let q = questions[index];

  let html = `
    <h3>${q.q}</h3>
    <p>❤️ ${life} | ⏱️ ${timeLeft}s | 🔥 ${combo}</p>
  `;

  q.o.forEach((opt,i)=>{
    html += `<div class="option" onclick="check(${i})">${opt}</div>`;
  });

  html += `<p>Score: ${score}</p>`;

  document.getElementById("app").innerHTML = html;
}

// TIMER
function startTimer(){
  clearInterval(timer);
  timer = setInterval(()=>{
    timeLeft--;
    document.querySelector("p").innerText = `❤️ ${life} | ⏱️ ${timeLeft}s | 🔥 ${combo}`;

    if(timeLeft <= 0){
      clearInterval(timer);
      life--;
      combo = 0;
      wrongSound.play();
      index++;
      loadQ();
    }
  },1000);
}

// CHECK
function check(i){
  clearInterval(timer);

  let q = questions[index];
  let opts = document.querySelectorAll(".option");

  if(i === q.a){
    opts[i].classList.add("correct");
    correctSound.play();

    combo++;
    score += 10 + combo*2;

  } else {
    opts[i].classList.add("wrong");
    opts[q.a].classList.add("correct");
    wrongSound.play();

    life--;
    combo = 0;
  }

  index++;
  setTimeout(loadQ,800);
}

// END
function endGame(){
  document.getElementById("app").innerHTML = `
    <h2>🏆 SELESAI</h2>
    <p>Score: ${score}</p>
    <button onclick="menu()">Main Lagi</button>
  `;
}

// GAME OVER
function gameOver(){
  document.getElementById("app").innerHTML = `
    <h2>💀 GAME OVER</h2>
    <p>Score: ${score}</p>
    <button onclick="menu()">Coba Lagi</button>
  `;
}

// INIT
menu();
</script>

</body>
</html>
