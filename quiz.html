<!DOCTYPE html>
<html>
<head>
  <title>Quiz Ultimate 💀</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f2027;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
    }

    input, select {
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      width: 80%;
    }

    .option {
      background: #333;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .correct { background: green; }
    .wrong { background: red; }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: orange;
    }
  </style>
</head>
<body>

<h2>🧠 QUIZ ULTIMATE</h2>

<div id="app" class="box"></div>

<script>
let user, category, score=0, xp=0, current;

const DB = {
  coding: [
    {q:"HTML itu?", o:["Bahasa web","Game","OS","DB"], a:0},
    {q:"CSS untuk?", o:["Logic","Design","Server","AI"], a:1}
  ],
  umum: [
    {q:"Ibukota Indonesia?", o:["Jakarta","Bandung","Medan","Bali"], a:0},
    {q:"2+2?", o:["3","4","5","6"], a:1}
  ]
};

// LOGIN SCREEN
function login(){
  document.getElementById("app").innerHTML = `
    <h3>Masuk</h3>
    <input id="name" placeholder="Nama kamu">
    <select id="cat">
      <option value="coding">Coding</option>
      <option value="umum">Umum</option>
    </select>
    <br>
    <button onclick="start()">START 🚀</button>
  `;
}

// START GAME
function start(){
  user = document.getElementById("name").value || "Player";
  category = document.getElementById("cat").value;
  loadQ();
}

// LOAD QUESTION
function loadQ(){
  let list = DB[category];
  current = list[Math.floor(Math.random()*list.length)];

  let html = `<h3>${current.q}</h3>`;
  current.o.forEach((opt,i)=>{
    html += `<div class="option" onclick="check(this,${i})">${opt}</div>`;
  });

  html += `<p>Score: ${score} | XP: ${xp}</p>`;
  html += `<button onclick="loadQ()">Next</button>`;

  document.getElementById("app").innerHTML = html;
}

// CHECK
function check(el,i){
  let opts=document.querySelectorAll(".option");

  if(i===current.a){
    el.classList.add("correct");
    score++;
    xp+=10;
  }else{
    el.classList.add("wrong");
    opts[current.a].classList.add("correct");
  }

  saveScore();
}

// SAVE LEADERBOARD
function saveScore(){
  let data = JSON.parse(localStorage.getItem("rank")||"[]");

  let found = data.find(d=>d.name===user);
  if(found){
    found.score = score;
    found.xp = xp;
  }else{
    data.push({name:user,score,xp});
  }

  localStorage.setItem("rank", JSON.stringify(data));
}

// LEADERBOARD
function showRank(){
  let data = JSON.parse(localStorage.getItem("rank")||"[]");
  data.sort((a,b)=>b.score-a.score);

  let html = "<h3>🏆 Leaderboard</h3>";
  data.forEach(d=>{
    html += `<p>${d.name} - Score:${d.score} XP:${d.xp}</p>`;
  });

  html += `<button onclick="login()">Back</button>`;
  document.getElementById("app").innerHTML = html;
}

// INIT
login();
</script>

<button onclick="showRank()">🏆 Leaderboard</button>

</body>
</html>
