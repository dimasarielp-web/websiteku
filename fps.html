<!DOCTYPE html>
<html>
<head>
  <title>FPS PRO 🔫🔥</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
      color: white;
    }

    #game {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #player {
      width: 20px;
      height: 20px;
      background: cyan;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .enemy {
      width: 50px;
      height: 50px;
      background: red;
      border-radius: 50%;
      position: absolute;
    }

    #crosshair {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid white;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
    }

    button {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px;
      background: lime;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>
