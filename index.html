<!DOCTYPE html>
<html>
<head>
  <title>Game Tebak Angka 🎮</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
    }

    .game {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>🎮 Game Tebak Angka</h1>

<div class="game">
  <p>Tebak angka dari 1 sampai 10</p>
  
  <input type="number" id="tebakan">
  <br>
  <button onclick="cek()">Cek</button>

  <p id="hasil"></p>
</div>

<script>
let angka = Math.floor(Math.random() * 10) + 1;

function cek() {
  let tebakan = document.getElementById("tebakan").value;

  if (tebakan == angka) {
    document.getElementById("hasil").innerHTML = "🎉 Benar! Kamu jago!";
  } else {
    document.getElementById("hasil").innerHTML = "❌ Salah! Coba lagi!";
  }
}
</script>

</body>
</html>
